<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart To-Do Scheduler</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <!-- Header -->
        <header class="header">
            <h1>📅 To-Do List</h1>
            <p class="subtitle">
                Susun tugas harianmu dengan lebih teratur dan efisien
            </p>
        </header>

        <!-- Form Input -->
        <section class="form-box">

            <input
                type="text"
                id="taskName"
                placeholder="Nama Tugas"
            >

            <input
                type="number"
                id="duration"
                placeholder="Durasi (menit)"
            >

            <input
                type="time"
                id="startTime"
            >

            <select id="priority">
                <option value="1">🔥 Penting & Mendesak</option>
                <option value="2">⭐ Penting & Tidak Mendesak</option>
                <option value="3">⚡ Tidak Penting & Mendesak</option>
                <option value="4">📝 Tidak Penting & Tidak Mendesak</option>
            </select>

            <button onclick="addTask()">
                + Tambah Tugas
            </button>

        </section>

        <!-- Card Content -->
        <div class="content">

            <!-- Daftar Tugas -->
            <div class="card">

                <h2>📋 Daftar Tugas</h2>

                <ul id="taskList">

                </ul>

            </div>

            <!-- Jadwal -->
            <div class="card">

                <h2>⏰ Jadwal Otomatis</h2>

                <ul id="scheduleList">

                </ul>

            </div>

        </div>

    </div>

<script>

let tasks = [];

function addTask(){

    const taskName =
    document.getElementById("taskName").value;

    const duration =
    document.getElementById("duration").value;

    const startTime =
    document.getElementById("startTime").value;

    const priority =
    document.getElementById("priority").value;

    if(
        taskName === "" ||
        duration === "" ||
        startTime === ""
    ){
        alert("Lengkapi semua data terlebih dahulu!");
        return;
    }

    tasks.push({
        taskName,
        duration: parseInt(duration),
        startTime,
        priority: parseInt(priority)
    });

    document.getElementById("taskName").value = "";
    document.getElementById("duration").value = "";

    renderTasks();
    generateSchedule();
}

function renderTasks(){

    const taskList =
    document.getElementById("taskList");

    taskList.innerHTML = "";

    tasks.forEach((task,index)=>{

        taskList.innerHTML += `

        <li>

            <div>

                <strong>${task.taskName}</strong><br>

                Durasi :
                ${task.duration} menit

            </div>

            <button
            class="delete-btn"
            onclick="deleteTask(${index})">

            Hapus

            </button>

        </li>

        `;

    });

}

function deleteTask(index){

    tasks.splice(index,1);

    renderTasks();
    generateSchedule();

}

function generateSchedule(){

    const scheduleList =
    document.getElementById("scheduleList");

    scheduleList.innerHTML = "";

    const sortedTasks =
    [...tasks].sort(
        (a,b)=>a.priority-b.priority
    );

    sortedTasks.forEach(task=>{

        let [hour,minute] =
        task.startTime
        .split(":")
        .map(Number);

        let start =
        hour * 60 + minute;

        let finish =
        start + task.duration;

        let finishHour =
        Math.floor(finish / 60);

        let finishMinute =
        finish % 60;

        scheduleList.innerHTML += `

        <li>

            <div>

                <strong>${task.taskName}</strong><br>

                ${task.startTime}
                -
                ${String(finishHour)
                .padStart(2,'0')}:
                ${String(finishMinute)
                .padStart(2,'0')}

                <br>

                Istirahat 10 menit

            </div>

        </li>

        `;

    });

}

</script>

</body>
</html>
