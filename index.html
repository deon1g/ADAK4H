<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart To-Do Scheduler</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>📅 Smart To-Do Scheduler</h1>
    <p class="subtitle">
        Susun jadwal harianmu dengan lebih teratur.
    </p>

    <div class="form-box">

        <input type="text" id="taskName" placeholder="Nama Tugas">

        <input type="number" id="duration" placeholder="Durasi (menit)">

        <input type="time" id="startTime">

        <select id="priority">
            <option value="1">Penting & Mendesak</option>
            <option value="2">Penting & Tidak Mendesak</option>
            <option value="3">Tidak Penting & Mendesak</option>
            <option value="4">Tidak Penting & Tidak Mendesak</option>
        </select>

        <button onclick="addTask()">Tambah Tugas</button>

    </div>

    <div class="card">
        <h2>Daftar Tugas</h2>
        <ul id="taskList"></ul>
    </div>

    <div class="card">
        <h2>Jadwal Otomatis</h2>
        <ul id="scheduleList"></ul>
    </div>

</div>

<script>

let tasks = [];

function addTask() {

    const name = document.getElementById("taskName").value;
    const duration = document.getElementById("duration").value;
    const startTime = document.getElementById("startTime").value;
    const priority = document.getElementById("priority").value;

    if(!name || !duration || !startTime){
        alert("Lengkapi semua data!");
        return;
    }

    tasks.push({
        name,
        duration: parseInt(duration),
        startTime,
        priority: parseInt(priority)
    });

    document.getElementById("taskName").value = "";
    document.getElementById("duration").value = "";

    renderTasks();
    generateSchedule();
}

function renderTasks(){

    const list = document.getElementById("taskList");
    list.innerHTML = "";

    tasks.forEach((task,index)=>{

        list.innerHTML += `
            <li>
                <div>
                    <strong>${task.name}</strong><br>
                    ${task.duration} menit
                </div>

                <button class="delete-btn"
                onclick="deleteTask(${index})">
                Hapus
                </button>
            </li>
        `;
    });
}

function deleteTask(index){
    tasks.splice(index,1);
    renderTasks();
    generateSchedule();
}

function generateSchedule(){

    const schedule = [...tasks];

    schedule.sort((a,b)=>a.priority-b.priority);

    const scheduleList =
    document.getElementById("scheduleList");

    scheduleList.innerHTML = "";

    schedule.forEach(task=>{

        let [hour,minute] =
        task.startTime.split(":").map(Number);

        let totalMinutes =
        hour*60 + minute;

        let endMinutes =
        totalMinutes + task.duration;

        let endHour =
        Math.floor(endMinutes/60);

        let endMinute =
        endMinutes%60;

        scheduleList.innerHTML += `
            <li>
                <strong>${task.name}</strong><br>
                ${task.startTime}
                -
                ${String(endHour).padStart(2,"0")}:
                ${String(endMinute).padStart(2,"0")}
                <br>
                Istirahat 10 menit setelah tugas
            </li>
        `;
    });
}

</script>

</body>
</html>
