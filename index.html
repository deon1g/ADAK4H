<div class="form-box">

    <input type="text" id="task" placeholder="Masukkan nama tugas">

    <input type="number" id="duration" placeholder="Durasi (menit)">

    <input type="time" id="startTime">

    <select id="priority">
        <option value="4">🔥 Penting & Mendesak</option>
        <option value="3">⭐ Penting</option>
        <option value="2">⏰ Mendesak</option>
        <option value="1">📝 Biasa</option>
    </select>

    <button onclick="addTask()">Tambah</button>

</div>
