<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Smart To-Do List</h1>

        <div class="form-box">
            <input type="text" id="task" placeholder="Nama Tugas">

            <input type="number" id="duration" placeholder="Durasi (menit)">

            <select id="priority">
                <option value="4">Penting & Mendesak</option>
                <option value="3">Penting & Tidak Mendesak</option>
                <option value="2">Tidak Penting & Mendesak</option>
                <option value="1">Tidak Penting & Tidak Mendesak</option>
            </select>

            <button onclick="addTask()">Tambah Tugas</button>
        </div>

        <h2>Daftar Tugas</h2>
        <ul id="taskList"></ul>

        <button class="schedule-btn" onclick="createSchedule()">
            Buat Jadwal
        </button>

        <h2>Jadwal Harian</h2>
        <div id="schedule"></div>
    </div>

<script>
let tasks = [];

function addTask() {
    const task = document.getElementById("task").value;
    const duration = document.getElementById("duration").value;
    const priority = document.getElementById("priority").value;

    if(task === "" || duration === "") {
        alert("Lengkapi data terlebih dahulu!");
        return;
    }

    tasks.push({
        name: task,
        duration: parseInt(duration),
        priority: parseInt(priority)
    });

    displayTasks();

    document.getElementById("task").value = "";
    document.getElementById("duration").value = "";
}

function displayTasks() {
    let list = document.getElementById("taskList");
    list.innerHTML = "";

    tasks.forEach((t) => {
        list.innerHTML += `
            <li>${t.name} - ${t.duration} menit</li>
        `;
    });
}

function createSchedule() {
    let sortedTasks = [...tasks].sort((a,b) => b.priority - a.priority);

    let schedule = document.getElementById("schedule");
    schedule.innerHTML = "";

    let hour = 7;
    let minute = 0;

    sortedTasks.forEach((task) => {

        let startHour = hour;
        let startMinute = minute;

        minute += task.duration;

        while(minute >= 60){
            hour++;
            minute -= 60;
        }

        let endHour = hour;
        let endMinute = minute;

        schedule.innerHTML += `
            <div class="card">
                <strong>${task.name}</strong><br>
                ${String(startHour).padStart(2,"0")}:${String(startMinute).padStart(2,"0")}
                -
                ${String(endHour).padStart(2,"0")}:${String(endMinute).padStart(2,"0")}
            </div>
        `;

        minute += 10;

        while(minute >= 60){
            hour++;
            minute -= 60;
        }
    });
}
</script>

</body>
</html>
